name: Publish GHCR image

on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: kaname-relay

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Prepare image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          image="${{ steps.image.outputs.name }}"
          short_sha="${GITHUB_SHA::7}"
          tags="-t ${image}:latest -t ${image}:sha-${short_sha}"
          if [[ "${GITHUB_EVENT_NAME}" == "release" && -n "${GITHUB_REF_NAME}" ]]; then
            tags="${tags} -t ${image}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list
        shell: bash
        run: |
          cd /tmp/digests
          digest_args=""
          for digest in *; do
            digest_args="${digest_args} ${{ steps.image.outputs.name }}@sha256:${digest}"
          done
          docker buildx imagetools create ${{ steps.tags.outputs.tags }} ${digest_args}

      - name: Inspect manifest list
        shell: bash
        run: |
          docker buildx imagetools inspect "${{ steps.image.outputs.name }}:latest"
