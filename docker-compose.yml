services:
  kaname-relay:
    build:
      context: .
      target: runtime
    image: kaname-relay:latest
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./data:/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/data/kaname-relay.sqlite
      KANAME_WEB_DIR: /app/apps/web/dist
      KANAME_MIGRATIONS_DIR: /app/packages/store/migrations
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
